<section style="padding:20px">
<h2>Latest Blogger Posts</h2>

<div id="blogger-posts"></div>

</section>

<script>
fetch("https://sobujany.blogspot.com/feeds/posts/default?alt=json")
.then(res => res.json())
.then(data => {

  let posts = data.feed.entry;
  let container = document.getElementById("blogger-posts");

  posts.slice(0,5).forEach(post => {

    let title = post.title.$t;
    let link = post.link.find(l => l.rel === "alternate").href;

    let div = document.createElement("div");
    div.innerHTML = `
      <h3>${title}</h3>
      <a href="${link}" target="_blank">Read More</a>
      <hr>
    `;

    container.appendChild(div);
  });

});
</script>
