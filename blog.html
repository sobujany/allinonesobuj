<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blog - Sultan Mahamud</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>My Blog</h1>
<p>Latest Posts from Blogger</p>
</header>

<section id="blogPosts" class="container"></section>

<script>
const feedUrl = "https://sobujany.blogspot.com/feeds/posts/default?alt=json";

fetch(feedUrl)
.then(response => response.json())
.then(data => {
  let posts = data.feed.entry;
  let container = document.getElementById("blogPosts");

  posts.slice(0,6).forEach(post => {

    let title = post.title.$t;
    let link = post.link.find(l => l.rel === "alternate").href;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${title}</h3>
      <a href="${link}" target="_blank">Read More</a>
    `;

    container.appendChild(div);
  });
});
</script>

</body>
</html>
