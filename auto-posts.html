<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Posts</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Auto Generated Posts</h1>
</header>

<section id="posts" style="padding:20px"></section>

<script>

const posts = [
  "How to earn money online",
  "AI দিয়ে টাকা আয়",
  "Blogging tutorial",
  "YouTube growth tips"
];

let container = document.getElementById("posts");

posts.forEach(post => {
  let div = document.createElement("div");
  div.innerHTML = "<h3>" + post + "</h3><p>Learn more about " + post + "</p>";
  container.appendChild(div);
});

</script>

</body>
</html>
